name: .NET Desktop

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  SOLUTION_FILE: LenovoBatteryTray.sln
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64
  ARTIFACT_NAME: LenovoBatteryTray-win-x64

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild $env:SOLUTION_FILE /restore /m /p:Configuration=$env:BUILD_CONFIGURATION /p:Platform=$env:BUILD_PLATFORM

      - name: Package build output
        shell: pwsh
        run: |
          $outputPath = "bin\$env:BUILD_PLATFORM\$env:BUILD_CONFIGURATION"
          $packageRoot = "artifacts\$env:ARTIFACT_NAME"
          $zipPath = "artifacts\$env:ARTIFACT_NAME.zip"

          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item -Path "$outputPath\*" -Destination $packageRoot -Recurse -Force

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path "$packageRoot\*" -DestinationPath $zipPath

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifacts/${{ env.ARTIFACT_NAME }}.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $assetPath = "artifacts\$env:ARTIFACT_NAME.zip"

          gh release view $env:GITHUB_REF_NAME *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:GITHUB_REF_NAME $assetPath --clobber
          }
          else {
            gh release create $env:GITHUB_REF_NAME $assetPath --generate-notes --title $env:GITHUB_REF_NAME
          }
